<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Interactive Floor Plan v1.10</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui,-apple-system,sans-serif; background:#f8f9fa; }
    #container {
      width:100%; height:50vh; margin-top:10vh;
      position:relative; background:#f0f2f5;
    }
    #map-svg {
      width:100%; height:100%; display:block;
      touch-action: manipulation;
      user-select:none; -webkit-user-select:none; -webkit-user-drag:none;
    }
    #shop-list-container {
      height:40vh; max-height:300px; overflow-y:auto; background:#fff;
      border-top:1px solid #e2e8f0; padding:16px; font-size:1rem; color:#2d3748;
    }
    #shop-list { list-style:none; }
    #shop-list li {
      padding:10px 12px; margin:6px 0; border-radius:6px; cursor:pointer;
      transition:all 0.2s; border:1px solid #e2e8f0;
    }
    #shop-list li:hover { background:#f1f5f9; }
    #shop-list li.active {
      background:#fefcbf; font-weight:600; border-color:#d69e2e;
    }
    .shop { cursor:pointer; transition:filter 0.35s ease, opacity 0.2s ease; }
    .shop:hover { opacity:0.92; }
    .shop.active { 
      -webkit-filter: hue-rotate(200deg) saturate(1.7) brightness(1.15) !important; 
      filter:hue-rotate(200deg) saturate(1.7) brightness(1.15) !important; 
    }
    #popup-container {
      position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:900;
    }
    #popup {
      position:absolute; background:white; border-radius:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.25); padding:16px 20px;
      max-width:220px; width:220px; pointer-events:auto; display:none;
      z-index:1000;
    }
    #popup:after {
      content:''; position:absolute; bottom:-14px; left:20px;
      border:10px solid transparent; border-top-color:white;
    }
    #popup h2 { margin:0 0 12px; font-size:1.1rem; color:#1a202c; }
    #popup .detail { margin:8px 0; font-size:0.85rem; color:#4a5568; }
    #popup .detail strong { color:#2d3748; }
    #close-btn {
      position:absolute; top:6px; right:10px; font-size:1.6rem;
      color:#718096; cursor:pointer; line-height:1;
    }
    #close-btn:hover { color:#2d3748; }
    #zoom-controls {
      position:absolute; bottom:20px; right:20px; z-index:1100;
      display:flex; flex-direction:column; gap:8px;
    }
    .zoom-btn {
      width:44px; height:44px; background:white; border:1px solid #cbd5e1;
      border-radius:8px; font-size:1.6rem; font-weight:bold; color:#334155;
      cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.12);
      transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    }
    .zoom-btn:hover { background:#f1f5f9; border-color:#94a3b8; transform:translateY(-1px); }
    .zoom-btn:active { transform:translateY(0); }
  </style>
</head>
<body>
v1.10
<div id="container">
  <svg id="map-svg" preserveAspectRatio="xMidYMid meet"></svg>

  <div id="popup-container">
    <div id="popup">
      <span id="close-btn">×</span>
      <h2 id="shop-title">Shop Name</h2>
      <div class="detail"><strong>Tel:</strong><br><span id="shop-tel">—</span></div>
      <div class="detail"><strong>Hours:</strong><br><span id="shop-hours">—</span></div>
    </div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">−</button>
  </div>
</div>

<div id="shop-list-container">
  <ul id="shop-list"></ul>
</div>

<script>
// ── Shop data ──────────────────────────────────────────────────────
const shopData = {
  "shop-01": { name: "Store 01", tel: "3123 4567", hours: "10:00 – 22:00" },
  "shop-02": { name: "Store 02", tel: "2899 3321", hours: "10:00 – 21:30" },
  "shop-05": { name: "Store 05", tel: "2345 6789", hours: "08:00 – 23:00" },
  "shop-08": { name: "Store 08", tel: "2987 6543", hours: "10:00 – 22:00" }
};

const svg = d3.select("#map-svg");
const container = document.getElementById("container");
let mapGroup;
let zoomBehavior;
let currentShopGroup = null;   // track which shop is selected

const svgUrl = "https://raw.githubusercontent.com/gad-devv/floorplan/refs/heads/main/floor-01_ai.svg";

// ── Load SVG ───────────────────────────────────────────────────────
fetch(svgUrl)
  .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
  .then(svgText => {
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(svgText, "image/svg+xml");
    if (svgDoc.querySelector("parsererror")) throw new Error("Invalid SVG");

    const importedRoot = svgDoc.documentElement;
    const vb = importedRoot.getAttribute("viewBox") || "0 0 1012 472";
    svg.attr("viewBox", vb);

    mapGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    mapGroup.id = "floorplan";
    while (importedRoot.firstChild) {
      mapGroup.appendChild(importedRoot.firstChild);
    }
    svg.node().appendChild(mapGroup);

    // Invisible rect for reliable touch capture
    svg.insert("rect", ":first-child")
      .attr("width", "100%")
      .attr("height", "100%")
      .attr("fill", "none")
      .attr("pointer-events", "all");

    const shops = d3.selectAll("#floorplan g[id^='shop-']");
    shops.classed("shop", true);

    // ── Click on map shop ────────────────────────────────────────
    shops.on("click", function(event) {
      event.stopPropagation();
      const g = d3.select(this);
      const id = g.attr("id");
      const info = shopData[id];
      if (!info) return;

      showPopupForShop(g, info);
    });

    // ── Zoom behavior ─────────────────────────────────────────────
    zoomBehavior = d3.zoom()
      .scaleExtent([0.3, 12])
      .translateExtent([[-3000,-3000],[5000,5000]])
      .touchable(true)
      .on("zoom", zoomed);

    svg.call(zoomBehavior);

    // Re-position popup on every zoom/pan
    function zoomed({transform}) {
      mapGroup.setAttribute("transform", transform);
      if (currentShopGroup) {
        updatePopupPosition(currentShopGroup);
      }
    }

    // ── Initial fit ───────────────────────────────────────────────
    const [,, vbW, vbH] = vb.split(/\s+/).map(Number);
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    let scale = Math.min(cw / vbW, ch / vbH) * 0.98;
    scale = Math.max(scale, 0.9);
    const tx = (cw - vbW * scale) / 2;
    const ty = (ch - vbH * scale) / 2;
    svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

    // Resize handler
    function resize() {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      let s = Math.min(cw / vbW, ch / vbH) * 0.98;
      s = Math.max(s, 0.8);
      const tx = (cw - vbW * s) / 2;
      const ty = (ch - vbH * s) / 2;
      svg.transition().duration(400).call(
        zoomBehavior.transform,
        d3.zoomIdentity.translate(tx, ty).scale(s)
      );
    }
    window.addEventListener("resize", resize);

    // ── Show popup & highlight ───────────────────────────────────
    function showPopupForShop(shopGroup, info) {
      currentShopGroup = shopGroup;

      shops.classed("active", false);
      shopGroup.classed("active", true);

      document.getElementById("shop-title").textContent = info.name;
      document.getElementById("shop-tel").textContent   = info.tel   || "—";
      document.getElementById("shop-hours").textContent = info.hours || "—";

      d3.select("#popup").style("display", "block");

      updatePopupPosition(shopGroup);
    }

    // ── Position popup 10px above top-center of shop ─────────────
    function updatePopupPosition(shopGroup) {
      const el = shopGroup.node();
      const bbox = el.getBBox();

      // Center-top of the shop in local coordinates
      const localX = bbox.x + bbox.width / 2;
      const localY = bbox.y;  // top edge

      // Convert to screen coordinates
      const ctm = el.getScreenCTM();
      if (!ctm) return;

      const screenX = localX * ctm.a + localY * ctm.c + ctm.e;
      const screenY = localX * ctm.b + localY * ctm.d + ctm.f;

      // Position popup ~10px above
      const popup = d3.select("#popup");
      popup
        .style("left", (screenX - 10) + "px")   // center horizontally (half width)
        .style("top",  (screenY - 220) + "px");   // 10–20px above top edge
    }

    // ── Zoom buttons ──────────────────────────────────────────────
    const zoomFactor = 1.4;
    d3.select("#zoom-in").on("click", () => {
      svg.transition().duration(400).call(
        zoomBehavior.scaleBy,
        zoomFactor,
        [container.clientWidth/2, container.clientHeight/2]
      );
    });
    d3.select("#zoom-out").on("click", () => {
      svg.transition().duration(400).call(
        zoomBehavior.scaleBy,
        1/zoomFactor,
        [container.clientWidth/2, container.clientHeight/2]
      );
    });

    // Close handlers
    function closePopup() {
      d3.select("#popup").style("display", "none");
      shops.classed("active", false);
      currentShopGroup = null;
    }

    d3.select("#close-btn").on("click", closePopup);
    svg.on("click", e => {
      if (e.target === svg.node() || !e.target.closest(".shop")) closePopup();
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closePopup();
    });

  })
  .catch(err => {
    console.error(err);
    alert("Cannot load SVG");
  });
</script>
</body>
</html>
